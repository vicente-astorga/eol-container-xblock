name: Python application

on:
  push:
    branches:
      - 'eol-release/*'
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - 'eol-release/*'

jobs:
  test:
    uses: eol-uchile/workflow-commons/.github/workflows/pythonapp.yml@vastorga/environment
    with:
      environment: 'cmmedu' 
      django-lms: true
      django-cms: false
      platform-eol: true
      platform-openuchile: true
    secrets: inherit
